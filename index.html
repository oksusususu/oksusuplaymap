<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청소년을 위한 💙 일탈 가이드 🌽</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    
    <style>
        /* =========================================
           현대적이고 미학적인 블루톤 브랜딩 CSS 디자인
        ========================================= */
        :root {
            --primary: #2563eb;       /* 메인 브랜드 블루 */
            --primary-light: #eff6ff; /* 매우 연한 배경 블루 */
            --primary-hover: #1d4ed8; /* 호버 시 블루 */
            
            --bg-white: #ffffff;
            --bg-light: #f8fafc;
            
            --text-dark: #0f172a;     /* 메인 텍스트 */
            --text-title: #1e40af;    /* 브랜드 타이틀 블루 */
            --text-muted: #64748b;    /* muted 텍스트 */
            
            --border-color: #e2e8f0;  /* 경계선 */
            --radius-md: 12px;
            --radius-sm: 8px;
            
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(37,99,235,0.08);
            --shadow-popup: 0 10px 30px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: 'Pretendard', sans-serif; background-color: var(--bg-light); color: var(--text-dark); -webkit-font-smoothing: antialiased; }

        .main-container { display: flex; width: 100%; height: 100vh; overflow: hidden; }

        /* =========================================
           왼쪽 사이드바 - 브랜딩 강화 디자인
        ========================================= */
        .sidebar {
            width: 380px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-white);
            box-shadow: 5px 0 20px rgba(0,0,0,0.04);
            z-index: 10;
            border-right: 1px solid var(--border-color);
        }

        /* 👑 미학적 사이드바 헤더 (브랜드 타이틀 영역) */
        .sidebar-header {
            padding: 30px 25px 15px; /* 세로폭을 넓혀 여유를 줌 */
            background: linear-gradient(180deg, var(--primary-light) 0%, rgba(255,255,255,1) 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .site-title {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .title-sub {
            font-size: 13px;
            font-weight: 500;
            color: var(--primary); /* "청소년을 위한" 부분은 브랜드 컬러로 */
            letter-spacing: 0.5px;
        }

        .title-main {
            font-size: 26px; /* 크기를 키워 강조 */
            font-weight: 800; /* 아주 두껍게 */
            color: var(--text-title); /* 진한 블루로 고급스럽게 */
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
